services:
  qw-app-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: qw-app-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "127.0.0.1:3007:3001"
    networks:
      - qw-app-net
    depends_on:
      - qw-app-postgres
      - qw-app-redis
  qw-app-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: qw-app-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3006:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://qw-app-backend:3001
    networks:
      - qw-app-net
    depends_on:
      - qw-app-backend
  qw-app-postgres:
    image: postgres:16-alpine
    container_name: qw-app-postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - qw_postgres_data:/var/lib/postgresql/data
    networks:
      - qw-app-net
  qw-app-redis:
    image: redis:7-alpine
    container_name: qw-app-redis
    restart: unless-stopped
    networks:
      - qw-app-net
networks:
  qw-app-net:
    name: qw-app-net
volumes:
  qw_postgres_data:
